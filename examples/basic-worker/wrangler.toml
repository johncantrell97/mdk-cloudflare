name = "mdk-cloudflare"
main = "worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "LIGHTNING_NODE"
class_name = "LightningNode"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LightningNode"]

# For local `wrangler dev`, copy .dev.vars.example to .dev.vars.
# For deployed Workers, set secrets via:
#   wrangler secret put MNEMONIC
#   wrangler secret put MDK_ACCESS_TOKEN

# Optional: set network explicitly
# [vars]
# NETWORK = "mainnet"
